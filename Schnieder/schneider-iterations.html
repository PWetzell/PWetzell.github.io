<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schneider — Design Iterations</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;background:#fff;color:#0A1628;font-family:"Inter",sans-serif;-webkit-font-smoothing:antialiased;scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}
.wrap{width:100%;padding:48px 0 0;}
.hd{padding:0 24px 28px;}
.etag{font-family:"DM Mono",monospace;font-size:11px;color:#1a2f5e;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.htitle{font-family:"Libre Baskerville",serif;font-size:clamp(20px,3vw,28px);color:#0A1628;line-height:1.15;margin-bottom:8px;}
.hsub{font-size:14px;color:#6B7C93;line-height:1.65;max-width:600px;}
.stepper{background:#fff;border:1px solid #D8E0EB;border-radius:14px;overflow:hidden;}
.tw{padding:20px 24px 0;}
.tr{display:flex;align-items:flex-start;position:relative;margin-bottom:16px;}
.line{position:absolute;top:17px;left:10%;right:10%;height:2px;background:#D8E0EB;border-radius:2px;}
.fill{height:100%;background:#1A2F5E;border-radius:2px;transition:width .35s;}
.si{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;z-index:2;}
.dot{width:34px;height:34px;border-radius:50%;border:2px solid #D0DCE8;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#9EB0C2;transition:all .2s;font-family:"DM Mono",monospace;}
.si.active .dot{border-color:#1A2F5E;background:#1A2F5E;color:#fff;font-weight:600;}
.si.done .dot{border-color:#1A2F5E;background:#fff;color:#1A2F5E;}
.slab{font-family:"DM Mono",monospace;font-size:11px;color:#9EB0C2;text-align:center;letter-spacing:.05em;text-transform:uppercase;line-height:1.2;max-width:60px;}
.si.active .slab{color:#0A1628;font-weight:600;}
.pnl{display:flex;flex-direction:column;border-top:1px solid #D8E0EB;}
.pcontent{height:460px;overflow-y:auto;padding:20px 24px 12px;scrollbar-width:none;-ms-overflow-style:none;}
.pcontent::-webkit-scrollbar{display:none;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 24px 14px;border-top:1px solid #E2E8F0;background:#fff;}
.nc{font-family:"Inter",sans-serif;font-size:12px;color:#1a2f5e;}
.btns{display:flex;gap:8px;}
.btn{font-family:"Inter",sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:6px;border:1.5px solid #D0DCE8;background:#fff;color:#6B7C93;cursor:pointer;transition:all .15s;}
.btn:hover{color:#1A2F5E;border-color:#1A2F5E;}
.btn.nx{background:#1A2F5E;border-color:#1A2F5E;color:#fff;}
.btn.nx:hover{background:#0A1628;}
.ptag{font-family:"DM Mono",monospace;font-size:11px;color:#1a2f5e;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:6px;}
.ph{font-family:"Libre Baskerville",serif;font-size:15px;color:#0A1628;font-weight:700;margin-bottom:8px;line-height:1.3;}
.it-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.it-img-wrap{background:#F5F5F4;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:200px;}
.it-img-wrap img{width:100%;height:auto;object-fit:contain;}
.it-side{display:flex;flex-direction:column;gap:10px;}
.goals-box{background:#F5F5F4;border:1px solid #E2E8F0;border-radius:6px;padding:12px 14px;}
.goals-label{font-family:"DM Mono",monospace;font-size:11px;color:#1a2f5e;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.goal-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.goal-num{width:18px;height:18px;border-radius:50%;background:#1A2F5E;color:#fff;font-family:"DM Mono",monospace;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.goal-text{font-size:12px;color:#6B7C93;line-height:1.45;}
.research-box{background:#E8EDF5;border:1px solid #B8C8DF;border-radius:6px;padding:12px 14px;}
.research-label{font-family:"DM Mono",monospace;font-size:11px;color:#1a2f5e;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:6px;}
.research-text{font-size:12px;color:#2A4070;line-height:1.5;}
.changes{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.change{background:#F5F5F4;border:1px solid #E2E8F0;border-radius:6px;padding:10px 12px;}
.change-num{font-family:"DM Mono",monospace;font-size:11px;color:#1a2f5e;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:4px;}
.change-text{font-size:12px;color:#6B7C93;line-height:1.5;}
.change-text strong{color:#0A1628;font-weight:600;}
@media(max-width:660px){.it-layout{grid-template-columns:1fr;}.changes{grid-template-columns:1fr;}.slab{display:none;}.dot{width:30px;height:30px;}.tw{padding:16px 14px 0;}.pcontent{padding:16px 16px 10px;}.nav{padding:10px 16px 14px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="etag">Design · Iterations</div>
    <h2 class="htitle">Five iterations. Each one shaped by research.</h2>
    <p class="hsub">Every design round started from a specific finding from customer interviews and workflow observations. Goals were defined before screens were drawn. Research-influenced improvements called out explicitly at each stage.</p>
  </div>
  <div class="stepper">
    <div class="tw"><div class="tr" id="tr"><div class="line"><div class="fill" id="fill"></div></div></div></div>
    <div class="pnl">
      <div class="pcontent" id="pcontent"></div>
      <div class="nav">
        <div class="nc" id="nav-counter"></div>
        <div class="btns" id="nav-btns"></div>
      </div>
    </div>
  </div>
</div>
<script>
var cur=0;
var S=[
{l:"Early",tag:"Early concept · Load builder wireframe",
h:"First wireframe — exploring the Configure interface before any iteration cycle began.",
img:"SE2.jpg",
goals:[
  {n:1,t:"Understand how users configure sites and assets."},
  {n:2,t:"Explore load building as a core workflow."},
  {n:3,t:"Define the left-nav asset list vs right-panel model pattern."}
],
research:"This wireframe predates the formal iteration cycles. It was produced from the customer interviews and workflow observations — specifically the finding that users needed to navigate complex site hierarchies and compliance models (CA Title 24, ASHRAE 90.1) without a clear mental model of how the layers related to each other.",
changes:[
  {n:"Direction 1",v:"<strong>Left nav as asset list</strong> — Name and Type columns establish the hierarchy before the main panel loads."},
  {n:"Direction 2",v:"<strong>Load Builder as a dedicated tab</strong> — separates the compliance model configuration from the main navigation."},
  {n:"Direction 3",v:"<strong>Site-level model context</strong> — Montreal site shown at the top of the right panel to anchor the user in the hierarchy."},
  {n:"Direction 4",v:"<strong>HVAC and Lighting Load as card-based sub-sections</strong> — explores whether loads can be managed as discrete cards before a grid pattern was introduced."}
]},
{l:"Iter 1",tag:"Iteration 01 · Module management & retention",
h:"Designing for retention — module management, subscription status, and utilization visible at a glance.",
img:"Interation-1.jpg",
goals:[
  {n:1,t:"Increase retention and subscriptions."},
  {n:2,t:"Shortcuts and ease of navigation."},
  {n:3,t:"Module management features."},
  {n:4,t:"Subscription updates and module status."},
  {n:5,t:"Billing notifications."},
  {n:6,t:"Visible module capabilities and information."}
],
research:"Modules tab redesigned with activation shortcut, tenant assignment, and utilization column. \"Follow the blue badges\" CTA pattern introduced to drive module exploration from within the platform.",
changes:[
  {n:"Change 1",v:"<strong>Activation shortcut added</strong> to the modules list — users no longer need to navigate away to activate."},
  {n:"Change 2",v:"<strong>Upgrades button</strong> added as a shortcut to the upgrades tab directly from the nav bar."},
  {n:"Change 3",v:"<strong>Module utilization column</strong> introduced — maps to time spent in each module to surface low-engagement risk."},
  {n:"Change 4",v:"<strong>Subscription & Billing notification badge</strong> added to surface billing alerts without interrupting workflow."}
]},

{l:"Iter 2",tag:"Iteration 02 · Upgrades and module discovery",
h:"Surfacing available upgrades — helping users understand what modules are available and applicable to their system.",
img:"Interation-2.jpg",
goals:[
  {n:4,t:"Subscription updates and module status."}
],
research:"Customer interviews revealed that Schneider customers were unaware of what modules were available for their subscriptions, what those modules did, and what value they provided. Newly released modules badge introduced — any interaction resets the NEW badge and chip color in the tab. Applicability estimate added based on historical use analysis.",
changes:[
  {n:"Change 1",v:"<strong>Newly released modules badge</strong> — resets on interaction to drive discovery without persistent noise."},
  {n:"Change 2",v:"<strong>Applicability estimate</strong> — shows how applicable additional modules would be based on historical use."},
  {n:"Change 3",v:"<strong>CTA to explore new modules</strong> linked directly to specific module pages on Exchange."},
  {n:"Change 4",v:"<strong>System compatibility scan</strong> added — surfaces whether the user's system can support a module before purchase."}
]},

{l:"Iter 3",tag:"Iteration 03 · Billing and invoice management",
h:"Giving users a clear, downloadable record of every subscription and module purchase.",
img:"Interation-3.jpg",
goals:[
  {n:1,t:"Increase retention and subscriptions."},
  {n:2,t:"Shortcuts and ease of navigation."},
  {n:3,t:"Module management features."},
  {n:4,t:"Subscription updates and module status."},
  {n:5,t:"Billing notifications."}
],
research:"Customer interviews revealed accounts were shared across large organizations and user management was difficult. Customers observed during workflow sessions had no visibility into what modules they owned or what they were entitled to. Billing tab redesigned as an invoice history with order number, plan type, date, and price — all filterable and downloadable.",
changes:[
  {n:"Change 1",v:"<strong>Invoice history table</strong> replaces the basic billing view — full purchase record per line item."},
  {n:"Change 2",v:"<strong>DSC seamless account</strong> flag added — if EO account, seamless account is included automatically."},
  {n:"Change 3",v:"<strong>Recent additions confirmation</strong> — users can confirm recent purchases without navigating away."},
  {n:"Change 4",v:"<strong>View/Download PDF</strong> action added — users can export invoice records for compliance and accounting."}
]},

{l:"Iter 4",tag:"Iteration 04 · Subscriptions and module detail",
h:"Full subscription context — installed modules, available upgrades, and module detail expandable in one view.",
img:"Interation-4.jpg",
goals:[
  {n:1,t:"Increase retention and subscriptions."},
  {n:2,t:"Shortcuts and ease of navigation."},
  {n:3,t:"Module management features."},
  {n:6,t:"Visible module capabilities and information."}
],
research:"Users needed to understand what was installed, what was locked, and what was available — in one place. Expandable module rows introduced so users can read full module descriptions without navigating away. Available modules surfaced below installed modules with pricing.",
changes:[
  {n:"Change 1",v:"<strong>Explore Products CTA</strong> links directly to Exchange/Shop tab from within the subscriptions view."},
  {n:"Change 2",v:"<strong>Upgrade button</strong> is a shortcut to the Transaction (Exchange) page — reduces navigation steps."},
  {n:"Change 3",v:"<strong>Manage button</strong> links to My Digital Library (Seamless) page for full asset management."},
  {n:"Change 4",v:"<strong>Expandable module rows</strong> — users can read full module descriptions inline without leaving the view."}
]},

{l:"Iter 5",tag:"Iteration 05 · Final module list with color coding",
h:"Color-coded module types and AutoSort — making the module list scannable at a glance.",
img:"Interation-5.jpg",
goals:[
  {n:1,t:"Increase retention and subscriptions."},
  {n:2,t:"Shortcuts and ease of navigation."},
  {n:3,t:"Module management features."},
  {n:4,t:"Subscription updates and module status."}
],
research:"GoDigital Modules were not seamless — users had to continue workflow in a new UI. Color-coded module types introduced to differentiate module categories visually. AutoSort added to order the list according to practice priority.",
changes:[
  {n:"Change 1",v:"<strong>Color-coded module type indicators</strong> — each category has a distinct color so users can scan by type."},
  {n:"Change 2",v:"<strong>Explore Modules CTA</strong> updated — links to Exchange/Shop tab with correct routing context."},
  {n:"Change 3",v:"<strong>AutoSort</strong> added — list ordered automatically according to practice priorities, not entry order."},
  {n:"Change 4",v:"<strong>GoDigital module continuity resolved</strong> — module workflow stays within EEO rather than launching a new UI."}
]}
];

function render(){
  var tr=document.getElementById('tr');
  var old=tr.querySelectorAll('.si');
  for(var i=0;i<old.length;i++) old[i].remove();
  for(var i=0;i<S.length;i++){
    var el=document.createElement('div');
    el.className='si'+(i===cur?' active':i<cur?' done':'');
    el.innerHTML='<div class="dot">'+(i+1)+'</div><div class="slab">'+S[i].l+'</div>';
    (function(idx){el.onclick=function(){go(idx);};})(i);
    tr.appendChild(el);
  }
  document.getElementById('fill').style.width=(cur/(S.length-1)*100)+'%';
  var s=S[cur];
  var goals='';
  for(var i=0;i<s.goals.length;i++) goals+='<div class="goal-item"><div class="goal-num">'+s.goals[i].n+'</div><div class="goal-text">'+s.goals[i].t+'</div></div>';
  var changes='';
  for(var i=0;i<s.changes.length;i++) changes+='<div class="change"><div class="change-num">'+s.changes[i].n+'</div><div class="change-text">'+s.changes[i].v+'</div></div>';
  var back=cur>0?'<button class="btn" onclick="go('+(cur-1)+')">&#8592; Back</button>':'';
  var next=cur<S.length-1?'<button class="btn nx" onclick="go('+(cur+1)+')">Next &#8594;</button>':'';
  document.getElementById('pcontent').innerHTML=
    '<div class="ptag">'+s.tag+'</div>'+
    '<div class="ph">'+s.h+'</div>'+
    '<div class="it-layout">'+
      '<div class="it-img-wrap"><img src="'+s.img+'" alt="Design iteration '+s.img+'"></div>'+
      '<div class="it-side">'+
        '<div class="goals-box"><div class="goals-label">Goals in mind</div>'+goals+'</div>'+
        '<div class="research-box"><div class="research-label">Research influenced</div><div class="research-text">'+s.research+'</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="changes">'+changes+'</div>';
  document.getElementById('nav-counter').textContent='Iteration '+(cur+1)+' of '+S.length;
  document.getElementById('nav-btns').innerHTML=back+next;
  document.getElementById('pcontent').scrollTop=0;
}
function go(i){cur=i;render();}
render();
</script>
</body>
</html>
