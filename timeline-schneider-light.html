<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schneider — Research Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;color:#0A1628;font-family:"Inter",sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:860px;margin:0 auto;padding:48px 32px 0;}
.sh{font-family:"Libre Baskerville",serif;font-size:clamp(20px,3vw,30px);color:#0A1628;line-height:1.15;margin-bottom:8px;}
.sd{font-size:14px;color:#6B7C93;line-height:1.6;max-width:580px;margin-bottom:28px;}
.box{background:#fff;border:1px solid #D8E0EB;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.tw{padding:16px 20px 0;}
.tr{display:flex;align-items:flex-start;position:relative;margin-bottom:16px;}
.line{position:absolute;top:17px;left:8.33%;right:8.33%;height:2px;background:#D8E0EB;border-radius:2px;}
.fill{height:100%;background:#1A2F5E;border-radius:2px;transition:width .35s;}
.si{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;z-index:2;}
.dot{width:34px;height:34px;border-radius:50%;border:2px solid #D0DCE8;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#9EB0C2;transition:all .2s;font-family:"DM Mono",monospace;}
.si.active .dot{border-color:#1A2F5E;background:#1A2F5E;color:#fff;font-weight:600;}
.si.done .dot{border-color:#1A2F5E;background:#fff;color:#1A2F5E;}
.slab{font-family:"DM Mono",monospace;font-size:11px;color:#9EB0C2;text-align:center;letter-spacing:.05em;text-transform:uppercase;line-height:1.2;max-width:60px;}
.si.active .slab{color:#0A1628;font-weight:600;}
.pnl{display:flex;flex-direction:column;border-top:1px solid #D8E0EB;}.pcontent{height:400px;overflow-y:auto;padding:16px 20px 12px;box-sizing:border-box;}
.ptag{font-family:"DM Mono",monospace;font-size:11px;color:#1A2F5E;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.ph{font-family:"Libre Baskerville",serif;font-size:15px;color:#0A1628;font-weight:700;margin-bottom:6px;line-height:1.25;}
.pb{font-size:13px;color:#6B7C93;line-height:1.55;margin-bottom:10px;}
.cells{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.cell{background:#F5F5F4;border:1px solid #E2E8F0;border-radius:6px;padding:8px 10px;}
.cl{font-family:"DM Mono",monospace;font-size:11px;color:#1a2f5e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.cv{font-size:12px;color:#6B7C93;line-height:1.5;}
.cv strong{color:#0A1628;font-weight:600;}
.ibox{border-radius:6px;padding:8px 10px;margin-bottom:10px;background:#E8EDF5;border:1px solid #B8C8DF;}
.il{font-family:"DM Mono",monospace;font-size:11px;color:#1a2f5e;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.iv{font-size:12px;color:#2A4070;line-height:1.5;}
.nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 20px 12px;border-top:1px solid #E2E8F0;background:#fff;}
.nc{font-family:"Inter",sans-serif;font-size:12px;color:#1a2f5e;}
.btns{display:flex;gap:8px;}
.btn{font-family:"Inter",sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:6px;border:1.5px solid #D0DCE8;background:#fff;color:#6B7C93;cursor:pointer;transition:all .15s;}
.btn:hover{color:#1A2F5E;border-color:#1A2F5E;}
.btn.nx{background:#1A2F5E;border-color:#1A2F5E;color:#fff;}
.mob{display:none;}
.acc-item{border:1px solid #D8E0EB;border-radius:10px;overflow:hidden;margin-bottom:8px;}
.acc-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;background:#fff;border:none;width:100%;text-align:left;}
.acc-num{width:28px;height:28px;border-radius:50%;border:2px solid #D0DCE8;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#9EB0C2;font-family:"DM Mono",monospace;flex-shrink:0;}
.acc-head.open .acc-num{border-color:#1A2F5E;background:#1A2F5E;color:#fff;}
.acc-lbl{font-family:"DM Mono",monospace;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#0A1628;font-weight:600;flex:1;}
.acc-arr{font-size:12px;color:#9EB0C2;transition:transform .2s;}
.acc-head.open .acc-arr{transform:rotate(180deg);}
.acc-body{display:none;padding:0 16px 16px;}
.acc-body.open{display:block;}
.acc-tag{font-family:"DM Mono",monospace;font-size:11px;color:#1A2F5E;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.acc-ph{font-family:"Libre Baskerville",serif;font-size:15px;font-weight:700;color:#0A1628;margin-bottom:6px;line-height:1.3;}
.acc-pb{font-size:13px;color:#6B7C93;line-height:1.6;margin-bottom:10px;}
.acc-cells{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.acc-cell{background:#F5F5F4;border-radius:6px;padding:10px 12px;}
.acc-ibox{background:#E8EDF5;border:1px solid #B8C8DF;border-radius:6px;padding:10px 12px;margin-bottom:10px;}
.acc-il{font-family:"DM Mono",monospace;font-size:11px;color:#1A2F5E;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.acc-iv{font-size:12px;color:#2A4070;line-height:1.5;}
@media(max-width:660px){.box{display:none;}.mob{display:block;}.wrap{padding:32px 16px 48px;}.sh{font-size:22px;}}
</style>
</head>
<body>
<div class="wrap">
<h2 class="sh">How research drove the design.</h2>
<p class="sd">Six stages from internal recruitment through clip-driven engineering reprioritization.</p>
<div class="box">
  <div class="tw"><div class="tr" id="tr"><div class="line"><div class="fill" id="fill"></div></div></div></div>
  <div class="pnl" id="pnl"><div class="pcontent" id="pcontent"></div><div class="nav" id="nav-bar"><div class="nc" id="nav-counter"></div><div class="btns" id="nav-btns"></div></div></div>
</div>
<div class="mob" id="mob"></div>
</div>
<script>
var cur=0;
var S=[
{l:"Recruit",tag:"Stage 01 · Participant recruitment",
h:"Internal channels, not an external panel. Real users who had already failed activations.",
b:"Twelve facilities managers and field technicians recruited from inside Schneider — people with real stakes and real workarounds already invented.",
cells:[
{l:"Who",v:"Facilities managers and field technicians with active EcoStruxure subscription responsibility."},
{l:"How recruited",v:"Internal Schneider channels. Screened for active subscription purchasing involvement."},
{l:"Sample",v:"12 participants — single-site and multi-site administrators."},
{l:"Why internal",v:"External panels simulate behavior. Internal recruitment surfaces people who already lived the problem."}
],impact:"Internal recruitment surfaces people whose workarounds are the research.",note:null,proto:false},

{l:"Discover",tag:"Stage 02 · Discovery interviews",
h:"No mental model of module dependencies. Every participant found out by failing activation.",
b:"Qualitative interviews before any prototype revealed a critical gap — dependency visualization had to become a primary UI surface.",
cells:[
{l:"Method",v:"Open-ended interviews. No prototype shown. Participants described their own process."},
{l:"Critical finding",v:"<strong>No mental model of module dependencies</strong> — discovered by failing activation."},
{l:"Assumption broken",v:"Users did not need a simpler form. They needed the dependency map visible first."},
{l:"Direction changed",v:"Dependency visualization added to scope as <strong>primary UI surface</strong> — before wireframes."}
],impact:"Discovery changed scope before a single wireframe existed.",note:null,proto:false},

{l:"Scripts",tag:"Stage 03 · Stakeholder script approval",
h:"Stakeholder review of scripts caught a design gap before any participant session ran.",
b:"Territory variation was far more complex than the design assumed — a single generic activation flow was no longer viable after stakeholder review.",
cells:[
{l:"Who reviewed",v:"Schneider product, engineering, and domain experts reviewed each scenario."},
{l:"Scenarios",v:"Module purchase, dependency resolution, territory selection, multi-site activation, renewal."},
{l:"Unexpected finding",v:"<strong>Territory variation far more complex</strong> than designed — different regions, different rules."},
{l:"Direction changed",v:"Territory-aware routing added to scope before any participant saw the prototype."}
],impact:"Stakeholder approval caught a design gap before testing — cheaper than catching it after.",note:null,proto:false},

{l:"Test",tag:"Stage 04 · UserTesting.com sessions",
h:"Moderated sessions. Stakeholders as silent observers. Real behavior on screen.",
b:"Paul moderated all 12 sessions. Stakeholders watched live. Two abandonment points surfaced in every session.",
cells:[
{l:"Platform",v:"UserTesting.com — full screen recording, audio, and researcher annotation."},
{l:"Facilitation",v:"Paul moderated all 12 sessions. Stakeholders joined as silent observers."},
{l:"Discovery 1",v:"Participants abandoned the dependency step — did not understand prerequisites <strong>before selecting a module.</strong>"},
{l:"Discovery 2",v:"<strong>Territory field confused every participant</strong> — internal taxonomy, not user vocabulary."}
],impact:"Stakeholders witnessed both abandonment points live — no interpretation layer required.",note:null,proto:false},

{l:"Clips",tag:"Stage 05 · Video clips distributed",
h:"Engineering reprioritized v1 scope after watching a 90-second clip.",
b:"Clips distributed to design, engineering, and stakeholders — same moment, same evidence, no summary that could be questioned.",
cells:[
{l:"Clips captured",v:"Dependency step abandonment. Territory dropdown confusion. Module hierarchy frustration."},
{l:"Shared with",v:"Design, engineering, and all stakeholder teams simultaneously."},
{l:"Engineering response",v:"Territory routing complexity confirmed. <strong>Moved from v2 to v1</strong> after one 90-second clip."},
{l:"Design response",v:"Dependency help text clip <strong>closed the debate</strong> about the visual dependency map."}
],impact:"Clips replaced findings documents. A real user abandoning activation aligned the team faster than any report.",note:null,proto:false},

{l:"Impact",tag:"Stage 06 · Design direction changed",
h:"Four decisions changed. Each traceable to a specific clip and participant moment.",
b:"Research did not just inform the design — it reversed decisions and moved engineering scope.",
cells:[
{l:"Change 1",v:"<strong>Dependency step replaced</strong> with visual dependency map — help text was not enough."},
{l:"Change 2",v:"<strong>Territory field replaced</strong> with auto-detection — no participant could navigate the dropdown."},
{l:"Change 3",v:"<strong>Activation wizard restructured</strong> — full journey map shown before step-by-step flow."},
{l:"Change 4",v:"<strong>Territory routing moved v2 to v1</strong> — engineering assumption became a v1 requirement."}
],impact:"Every change traceable to a specific clip, participant, and moment. Design decisions, not design guesses.",note:null,proto:false}
];

function render(){
  var tr=document.getElementById('tr');var old=tr.querySelectorAll('.si');
  for(var i=0;i<old.length;i++) old[i].remove();
  for(var i=0;i<S.length;i++){var el=document.createElement('div');el.className='si'+(i===cur?' active':i<cur?' done':'');el.innerHTML='<div class="dot">'+(i+1)+'</div><div class="slab">'+S[i].l+'</div>';(function(idx){el.onclick=function(){go(idx);};})(i);tr.appendChild(el);}
  document.getElementById('fill').style.width=(cur/(S.length-1)*100)+'%';
  var s=S[cur];var cells='';for(var i=0;i<s.cells.length;i++) cells+='<div class="cell"><div class="cl">'+s.cells[i].l+'</div><div class="cv">'+s.cells[i].v+'</div></div>';
  var imp=s.impact?'<div class="ibox"><div class="il">Design impact</div><div class="iv">'+s.impact+'</div></div>':'';
  var back=cur>0?'<button class="btn" onclick="go('+(cur-1)+')">&#8592; Back</button>':'';
  var next=cur<S.length-1?'<button class="btn nx" onclick="go('+(cur+1)+')">Next &#8594;</button>':'';
  document.getElementById('pcontent').innerHTML='<div class="ptag">'+s.tag+'</div><div class="ph">'+s.h+'</div><div class="pb">'+s.b+'</div><div class="cells">'+cells+'</div>'+imp;
  document.getElementById('nav-counter').textContent='Stage '+(cur+1)+' of '+S.length;
  document.getElementById('nav-btns').innerHTML=back+next;
  document.getElementById('pcontent').scrollTop=0;
}
function go(i){cur=i;render();}
function toggleAcc(i){var b=document.getElementById('ab'+i),h=document.getElementById('ah'+i);var open=b.classList.contains('open');document.querySelectorAll('.acc-body').forEach(function(x){x.classList.remove('open');});document.querySelectorAll('.acc-head').forEach(function(x){x.classList.remove('open');});if(!open){b.classList.add('open');h.classList.add('open');}}
function buildMob(){var html='';for(var i=0;i<S.length;i++){var s=S[i];var cells='';for(var j=0;j<s.cells.length;j++) cells+='<div class="acc-cell"><div class="cl">'+s.cells[j].l+'</div><div class="cv">'+s.cells[j].v+'</div></div>';var imp=s.impact?'<div class="acc-ibox"><div class="acc-il">Design impact</div><div class="acc-iv">'+s.impact+'</div></div>':'';html+='<div class="acc-item"><button class="acc-head'+(i===0?' open':'')+'" id="ah'+i+'" onclick="toggleAcc('+i+')"><div class="acc-num">'+(i+1)+'</div><div class="acc-lbl">'+s.l+'</div><span class="acc-arr">&#9660;</span></button><div class="acc-body'+(i===0?' open':'')+'" id="ab'+i+'"><div class="acc-tag">'+s.tag+'</div><div class="acc-ph">'+s.h+'</div><div class="acc-pb">'+s.b+'</div><div class="acc-cells">'+cells+'</div>'+imp+'</div></div>';}document.getElementById('mob').innerHTML=html;}
render();buildMob();
</script>
</body>
</html>
